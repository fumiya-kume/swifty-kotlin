# opening_brace は SwiftFormat の wrapMultilineStatementBraces と競合するため無効化
# （SwiftFormat は複数行文で { を改行、SwiftLint は同一行を要求）
disabled_rules:
  - opening_brace
  - large_tuple
  - trailing_comma
  - optional_data_string_conversion
  - blanket_disable_command

identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - super_
    - init_
    - is_
    - S0
    - S1
    - O0
    - O1
    - O2
    - O3
    - v2_3_10

cyclomatic_complexity:
  warning: 25
  error: 50

function_body_length:
  warning: 400
  error: 800

type_body_length:
  warning: 800
  error: 1200

file_length:
  warning: 800
  error: 1500

line_length:
  warning: 200
  error: 250

function_parameter_count:
  warning: 12
  error: 15

included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
