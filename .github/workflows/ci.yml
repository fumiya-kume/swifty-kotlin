name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-coverage:
    name: Test and Coverage Gate
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Run smoke tests
        run: swift test --filter SmokeTests

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Ensure kotlinc is installed
        run: |
          if ! command -v kotlinc >/dev/null 2>&1; then
            brew update
            brew install kotlin
          fi
          kotlinc -version

      - name: Build compiler
        run: swift build

      - name: Run kotlinc diff regression cases
        run: bash Scripts/diff_kotlinc.sh Scripts/diff_cases

      - name: Ensure jq is installed
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            brew update
            brew install jq
          fi

      - name: Run tests with coverage threshold
        env:
          COVERAGE_THRESHOLD: "95"
        run: bash Scripts/check_coverage.sh
