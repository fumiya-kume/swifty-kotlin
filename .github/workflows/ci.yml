name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  jscpd-check:
    name: Duplicate Code Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install jscpd
        run: npm install -g jscpd@4.0.8
      - name: Run jscpd
        run: jscpd --threshold 5 --min-lines 15 --format swift Sources/

  style-check:
    name: Swift Style Checks
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Swift style tools
        env:
          SWIFTLINT_VERSION: "0.63.2"
          SWIFTFORMAT_VERSION: "0.59.1"
        run: |
          TOOLS_DIR="${RUNNER_TEMP}/swift-style-tools"
          BIN_DIR="${TOOLS_DIR}/bin"
          mkdir -p "$BIN_DIR"

          curl -sSL -o "${TOOLS_DIR}/swiftlint.zip" "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip"
          unzip -q "${TOOLS_DIR}/swiftlint.zip" -d "$BIN_DIR"
          chmod +x "${BIN_DIR}/swiftlint"

          curl -sSL -o "${TOOLS_DIR}/swiftformat.zip" "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.zip"
          unzip -q "${TOOLS_DIR}/swiftformat.zip" -d "$BIN_DIR"
          chmod +x "${BIN_DIR}/swiftformat"

          echo "$BIN_DIR" >> "$GITHUB_PATH"
      - name: Verify tool versions
        run: |
          test "$(swiftlint version)" = "0.63.2"
          test "$(swiftformat --version)" = "0.59.1"
      - name: Run SwiftFormat lint
        run: bash Scripts/swift_format.sh --lint
      - name: Run SwiftLint
        run: bash Scripts/swift_lint.sh

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm-dev
      - name: Configure LLVM paths
        run: |
          LLVM_PREFIX="$(llvm-config --prefix)"
          echo "C_INCLUDE_PATH=${LLVM_PREFIX}/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=${LLVM_PREFIX}/lib" >> "$GITHUB_ENV"
      - name: Show toolchain versions
        run: swift --version
      - name: Build with strict concurrency (warnings)
        run: swift build -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Run smoke tests
        run: bash Scripts/swift_test.sh --filter SmokeTests -Xswiftc -swift-version -Xswiftc 6

  diff-regression:
    name: kotlinc Diff Regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KOTLIN_VERSION: "2.3.10"
      KOTLINX_COROUTINES_VERSION: "1.10.2"
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm-dev
      - name: Configure LLVM paths
        run: |
          LLVM_PREFIX="$(llvm-config --prefix)"
          echo "C_INCLUDE_PATH=${LLVM_PREFIX}/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=${LLVM_PREFIX}/lib" >> "$GITHUB_ENV"
      - name: Install Kotlin and Java
        run: |
          sudo apt-get install -y default-jdk unzip
          TOOLS_DIR="${RUNNER_TEMP}/kotlin-tools"
          KOTLIN_DIR="${TOOLS_DIR}/kotlin"
          mkdir -p "$TOOLS_DIR"

          curl -sSL -o "${TOOLS_DIR}/kotlin-compiler.zip" \
            "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip"
          unzip -q "${TOOLS_DIR}/kotlin-compiler.zip" -d "$KOTLIN_DIR"
          echo "${KOTLIN_DIR}/kotlinc/bin" >> "$GITHUB_PATH"

          curl -sSL -o "${TOOLS_DIR}/kotlinx-coroutines-core-jvm.jar" \
            "https://repo1.maven.org/maven2/org/jetbrains/kotlinx/kotlinx-coroutines-core-jvm/${KOTLINX_COROUTINES_VERSION}/kotlinx-coroutines-core-jvm-${KOTLINX_COROUTINES_VERSION}.jar"
          echo "KOTLINC_CLASSPATH=${TOOLS_DIR}/kotlinx-coroutines-core-jvm.jar" >> "$GITHUB_ENV"
      - name: Verify prerequisites
        run: |
          java -version
          kotlinc -version
          test -f "$KOTLINC_CLASSPATH"
      - name: Build compiler
        run: swift build -Xswiftc -swift-version -Xswiftc 6
      - name: Build with strict concurrency (warnings)
        run: swift build -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Run kotlinc diff regression cases
        id: diff_kotlinc
        continue-on-error: true
        env:
          DIFF_REPORT: ${{ runner.temp }}/diff_kotlinc_report.tsv
          DIFF_COMPILE_TIMEOUT: "120"
          DIFF_RUN_TIMEOUT: "30"
        run: bash Scripts/diff_kotlinc.sh --report "$DIFF_REPORT" Scripts/diff_cases
      - name: Summarize kotlinc diff artifacts
        if: always()
        env:
          DIFF_REPORT: ${{ runner.temp }}/diff_kotlinc_report.tsv
        run: bash Scripts/diff_kotlinc_ci_summary.sh --report "$DIFF_REPORT"
      - name: Fail when kotlinc diff regression mismatches exist
        if: steps.diff_kotlinc.outcome == 'failure'
        run: |
          echo "kotlinc diff regression cases failed." >&2
          exit 1

  coverage-test-shards:
    name: Coverage Test Shard (${{ matrix.shard_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 0
            shard_name: "1/4"
          - shard_index: 1
            shard_name: "2/4"
          - shard_index: 2
            shard_name: "3/4"
          - shard_index: 3
            shard_name: "4/4"
    env:
      SWIFT_TEST_TOTAL_SHARDS: "4"
      SWIFT_TEST_SHARD_INDEX: ${{ matrix.shard_index }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm-dev
      - name: Configure LLVM paths
        run: |
          LLVM_PREFIX="$(llvm-config --prefix)"
          echo "C_INCLUDE_PATH=${LLVM_PREFIX}/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=${LLVM_PREFIX}/lib" >> "$GITHUB_ENV"
      - name: Run sharded tests with coverage
        run: bash Scripts/swift_test_shard.sh --enable-code-coverage
      - name: Collect shard coverage profile
        run: |
          PROFILE_PATH="$(find .build -name "default.profdata" 2>/dev/null | head -1)"
          if [[ -z "$PROFILE_PATH" ]]; then
            echo "default.profdata not found after sharded test run." >&2
            exit 1
          fi
          cp "$PROFILE_PATH" "${RUNNER_TEMP}/coverage-shard-${{ matrix.shard_index }}.profdata"
      - name: Upload shard coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profdata-${{ matrix.shard_index }}
          path: ${{ runner.temp }}/coverage-shard-${{ matrix.shard_index }}.profdata
          if-no-files-found: error
      - name: Collect tests binary
        if: matrix.shard_index == 0
        run: |
          TESTS_BINARY="$(find .build -name "KSwiftKPackageTests.xctest" 2>/dev/null | head -1)"
          if [[ -z "$TESTS_BINARY" ]]; then
            echo "KSwiftKPackageTests.xctest was not found." >&2
            exit 1
          fi
          cp "$TESTS_BINARY" "${RUNNER_TEMP}/coverage-tests-binary.xctest"
      - name: Upload tests binary
        if: matrix.shard_index == 0
        uses: actions/upload-artifact@v4
        with:
          name: coverage-tests-binary
          path: ${{ runner.temp }}/coverage-tests-binary.xctest
          if-no-files-found: error

  test-and-coverage:
    name: Test and Coverage Gate
    runs-on: ubuntu-latest
    needs: coverage-test-shards
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Fail when a coverage shard fails
        if: needs.coverage-test-shards.result != 'success'
        run: |
          echo "One or more coverage shards failed." >&2
          exit 1
      - uses: actions/checkout@v4
      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Verify prerequisites
        run: |
          jq --version
          swift --version
      - name: Configure coverage tools from Swift toolchain
        run: |
          TOOLCHAIN_BIN="$(dirname "$(command -v swift)")"
          echo "LLVM_COV_BIN=${TOOLCHAIN_BIN}/llvm-cov" >> "$GITHUB_ENV"
          echo "LLVM_PROFDATA_BIN=${TOOLCHAIN_BIN}/llvm-profdata" >> "$GITHUB_ENV"
          "${TOOLCHAIN_BIN}/llvm-profdata" --version
          "${TOOLCHAIN_BIN}/llvm-cov" --version
      - name: Download shard coverage profiles
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-profdata-*
          path: ${{ runner.temp }}/coverage-profiles
          merge-multiple: true
      - name: Download tests binary
        uses: actions/download-artifact@v4
        with:
          name: coverage-tests-binary
          path: ${{ runner.temp }}/coverage-binary
      - name: Merge shard coverage profiles
        id: merged_profile
        run: |
          shopt -s nullglob
          profiles=("${RUNNER_TEMP}/coverage-profiles"/coverage-shard-*.profdata)
          if (( ${#profiles[@]} == 0 )); then
            echo "No shard coverage profiles were downloaded." >&2
            exit 1
          fi

          MERGED_PROFILE="${RUNNER_TEMP}/merged.profdata"
          "${LLVM_PROFDATA_BIN}" merge -sparse "${profiles[@]}" -o "$MERGED_PROFILE"
          echo "path=${MERGED_PROFILE}" >> "$GITHUB_OUTPUT"
      - name: Run tests with coverage threshold
        id: coverage
        continue-on-error: true
        env:
          COVERAGE_THRESHOLD: "80"
          COVERAGE_REPORT_MD: ${{ runner.temp }}/coverage_report.md
          COVERAGE_SKIP_TEST_RUN: "1"
          COVERAGE_PROFILE_PATH: ${{ steps.merged_profile.outputs.path }}
          COVERAGE_TESTS_BINARY: ${{ runner.temp }}/coverage-binary/coverage-tests-binary.xctest
        run: bash Scripts/check_coverage.sh
      - name: Post or update coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          COVERAGE_REPORT_MD: ${{ runner.temp }}/coverage_report.md
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- coverage-gate-report -->';
            const outcome = '${{ steps.coverage.outcome }}';

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (outcome === 'success') {
              // Coverage passed — remove stale failure comment if present
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              return;
            }

            // Coverage failed — post or update the comment
            const reportPath = process.env.COVERAGE_REPORT_MD;
            let body = '';
            if (reportPath && fs.existsSync(reportPath)) {
              body = fs.readFileSync(reportPath, 'utf8');
            } else {
              body = `${marker}\n## :warning: Coverage Check Failed\n\nCoverage report was not generated. Check the CI logs for details.`;
            }

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
      - name: Fail if coverage is below threshold
        if: steps.coverage.outcome == 'failure'
        run: |
          echo "Coverage check failed. See the PR comment for details." >&2
          exit 1
