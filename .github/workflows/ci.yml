name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1

jobs:
  smoke-tests:
    name: Smoke Tests (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-15
            arch: ARM64
          - os: macos-13
            arch: Intel
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM
        run: brew install llvm
      - name: Configure LLVM paths
        run: |
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "C_INCLUDE_PATH=${LLVM_PREFIX}/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=${LLVM_PREFIX}/lib" >> "$GITHUB_ENV"
      - name: Show toolchain versions
        run: swift --version
      - name: Run smoke tests
        run: bash Scripts/swift_test.sh --filter SmokeTests

  diff-regression:
    name: kotlinc Diff Regression (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-15
            arch: ARM64
          - os: macos-13
            arch: Intel
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install llvm kotlin
      - name: Configure LLVM paths
        run: |
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "C_INCLUDE_PATH=${LLVM_PREFIX}/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=${LLVM_PREFIX}/lib" >> "$GITHUB_ENV"
      - name: Verify prerequisites
        run: |
          java -version
          kotlinc -version
      - name: Build compiler
        run: swift build
      - name: Run kotlinc diff regression cases
        id: diff_kotlinc
        continue-on-error: true
        env:
          DIFF_REPORT: ${{ runner.temp }}/diff_kotlinc_report.tsv
        run: bash Scripts/diff_kotlinc.sh --report "$DIFF_REPORT" Scripts/diff_cases
      - name: Summarize kotlinc diff artifacts
        if: always()
        env:
          DIFF_REPORT: ${{ runner.temp }}/diff_kotlinc_report.tsv
        run: bash Scripts/diff_kotlinc_ci_summary.sh --report "$DIFF_REPORT"
      - name: Fail when kotlinc diff regression mismatches exist
        if: steps.diff_kotlinc.outcome == 'failure'
        run: |
          echo "kotlinc diff regression cases failed." >&2
          exit 1

  test-and-coverage:
    name: Test and Coverage Gate (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-15
            arch: ARM64
          - os: macos-13
            arch: Intel
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM
        run: brew install llvm
      - name: Configure LLVM paths
        run: |
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "C_INCLUDE_PATH=${LLVM_PREFIX}/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=${LLVM_PREFIX}/lib" >> "$GITHUB_ENV"
      - name: Verify prerequisites
        run: jq --version
      - name: Run tests with coverage threshold
        env:
          COVERAGE_THRESHOLD: "95"
        run: bash Scripts/check_coverage.sh
